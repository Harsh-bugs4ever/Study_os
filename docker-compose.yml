services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: studyos
      POSTGRES_USER: studyos
      POSTGRES_PASSWORD: studyos
    ports:
      - "5432:5432"
    volumes:
      - studyos_postgres:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyos"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  studyos_postgres:
